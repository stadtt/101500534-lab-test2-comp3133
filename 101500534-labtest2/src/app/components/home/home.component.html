<app-header></app-header>

@for (character of characters(); track character.id) {
  <div [routerLink]="['/character', character.id]" class="mx-auto max-w-6xl px-6 py-6 sm:px-10 sm:py-8">
    <div  class="flex flex-col items-center gap-4 rounded-lg bg-stone-800 p-4 text-center text-amber-100 shadow-lg">
      <h2 class="text-xl font-bold">{{ character.name }}</h2>
      <p class="text-sm text-amber-300">House: {{ character.house }}</p>
    </div>
  </div>
}
