<app-header></app-header>

<section class="mx-auto max-w-7xl px-6 py-6 sm:px-10 sm:py-8">
	<div class="grid gap-6 lg:grid-cols-[320px_minmax(0,1fr)] lg:items-start">
		
		<div>
			<h2 class="mb-4 text-2xl font-bold text-amber-100">Character List</h2>

			<div class="grid gap-4">
				@for (character of characters(); track character.id) {
					<div class="rounded-lg bg-stone-800 p-4 text-amber-100 shadow-lg">
						<h3 class="text-xl font-bold">{{ character.name }}</h3>
						<p class="text-sm text-amber-300">House: {{ character.house }}</p>
						@if (character.image) {
							<img [src]="character.image" [alt]="character.name" class="mt-3 h-48 w-auto rounded-md object-cover" />
						}
					</div>
				}
			</div>
		</div>
	</div>
</section>
