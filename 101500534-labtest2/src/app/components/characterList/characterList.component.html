<app-header></app-header>

<section class="mx-auto max-w-7xl px-6 py-6 sm:px-10 sm:py-8">
  <div class="grid gap-6 lg:grid-cols-[320px_minmax(0,1fr)] lg:items-stretch">
    <app-character-filter (houseSelected)="onHouseSelected($event)"></app-character-filter>

    <div>
      <h2 class="mb-4 text-2xl font-bold text-black-100">Character List</h2>

      <div class="grid gap-4">
        @for (character of characters(); track character.id) {
          <div [routerLink]="['/character', character.id]" class="cursor-pointer rounded-lg bg-stone-800 p-4 text-amber-100 shadow-lg">
            <div class="flex flex-col items-center gap-4 text-center sm:flex-row sm:text-left">
              @if (character.image) {
                <img [src]="character.image" [alt]="character.name" class="h-40 w-32 rounded-md object-cover" />
              }
              <div>
                <h3 class="text-xl font-bold">{{ character.name }}</h3>
                <p class="text-sm text-amber-300">House: {{ character.house }}</p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
